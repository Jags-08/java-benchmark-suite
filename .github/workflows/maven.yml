name: Java CI with Maven\n\non:\n  push:\n    branches: [ "main" ]\n  pull_request:\n    branches: [ "main" ]\n\njobs:\n  build:\n\n    runs-on: ubuntu-latest\n\n    steps:\n    - uses: actions/checkout@v3\n    - name: Set up JDK 17\n      uses: actions/setup-java@v3\n      with:\n        java-version: "17"\n        distribution: "temurin"\n        cache: maven\n    - name: Build with Maven\n      run: mvn -B package --file pom.xml
